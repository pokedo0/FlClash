name: Sync Upstream & Release Android APK

on:
  workflow_dispatch:
  schedule:
    # 每天 2 次（UTC），可按需调整
    - cron: "15 2,14 * * *"

concurrency:
  group: sync-and-release
  cancel-in-progress: false

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has_new_release: ${{ steps.check.outputs.has_new_release }}
      upstream_tag: ${{ steps.check.outputs.upstream_tag }}
    steps:
      - name: Check upstream latest release
        id: check
        shell: bash
        run: |
          set -euo pipefail

          UPSTREAM_TAG=$(curl -sf "https://api.github.com/repos/chen08209/FlClash/releases/latest" | jq -r '.tag_name')
          OUR_TAG=$(curl -sf "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r '.tag_name' || echo "null")

          echo "Upstream Tag: $UPSTREAM_TAG"
          echo "Our Tag: $OUR_TAG"

          is_new_release="true"
          if [[ "$UPSTREAM_TAG" == "null" ]]; then
            is_new_release="false"
          elif [[ "$UPSTREAM_TAG" == "$OUR_TAG" ]]; then
            is_new_release="false"
          elif [[ "$OUR_TAG" =~ ^(.*)-[0-9]{12}$ ]] && [[ "${BASH_REMATCH[1]}" == "$UPSTREAM_TAG" ]]; then
            is_new_release="false"
          fi

          echo "has_new_release=$is_new_release" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=$UPSTREAM_TAG" >> "$GITHUB_OUTPUT"

      - name: Sync fork with upstream (main)
        if: steps.check.outputs.has_new_release == 'true'
        shell: bash
        run: |
          set -euo pipefail

          echo "🔄 Syncing fork with upstream..."
          HTTP_CODE=$(curl -s -o /tmp/sync_response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/merge-upstream" \
            -d '{"branch":"main"}')

          if [[ "$HTTP_CODE" == "200" || "$HTTP_CODE" == "409" ]]; then
            echo "✅ Fork synced (or already up-to-date)"
          else
            echo "❌ Sync failed with HTTP $HTTP_CODE"
            cat /tmp/sync_response.json || true
            exit 1
          fi

  build-and-release:
    needs: check-and-sync
    if: needs.check-and-sync.outputs.has_new_release == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/settings.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Prebuild Android
        run: npx expo prebuild --platform android

      # 最简单固定签名方案：
      # 用固定参数生成/复用 debug.keystore，保证同包名可覆盖更新
      - name: Cache fixed debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-permanent-v1

      - name: Ensure fixed debug keystore exists
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v \
              -storetype JKS \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build release APK
        shell: bash
        run: |
          set -euo pipefail
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a,armeabi-v7a --no-daemon --build-cache --parallel

      - name: Align and sign APK (fixed debug keystore)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p final-apks

          APK_PATH=$(find android/app/build/outputs/apk/release -type f \( -name "*-unsigned.apk" -o -name "app-release.apk" \) | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Release APK not found."
            exit 1
          fi
          echo "APK_PATH=$APK_PATH"

          BUILD_TOOLS_DIR="$ANDROID_HOME/build-tools/$(ls -1 "$ANDROID_HOME/build-tools" | sort -r | head -n 1)"
          "$BUILD_TOOLS_DIR/zipalign" -v -p 4 "$APK_PATH" final-apks/FlClash-Release-aligned.apk

          "$BUILD_TOOLS_DIR/apksigner" sign --ks ~/.android/debug.keystore \
            --ks-pass pass:android --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --out final-apks/FlClash-Release.apk \
            final-apks/FlClash-Release-aligned.apk

          "$BUILD_TOOLS_DIR/apksigner" verify --verbose final-apks/FlClash-Release.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlClash-Release-APK
          path: final-apks/FlClash-Release.apk

      - name: Generate release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          UPSTREAM_TAG="${{ needs.check-and-sync.outputs.upstream_tag }}"
          if [ -n "$UPSTREAM_TAG" ] && [ "$UPSTREAM_TAG" != "null" ]; then
            echo "tag_name=${UPSTREAM_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=auto-$(date +'%Y%m%d%H%M')" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: "Auto Build: ${{ steps.tag.outputs.tag_name }}"
          body: |
            🚀 自动同步上游并构建 Android Release APK（自用固定签名）。

            - 包名保持为你仓库当前配置（已改为 `com.news.toutiao`）
            - 使用固定 debug keystore 参数签名，支持同包名覆盖更新
            - 产物：`FlClash-Release.apk`
          files: final-apks/FlClash-Release.apk
