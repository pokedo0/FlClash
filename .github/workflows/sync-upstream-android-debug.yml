name: sync upstream android debug release

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  sync-build-release:
    runs-on: ubuntu-latest
    concurrency:
      group: sync-upstream-android-debug-release
      cancel-in-progress: true
    timeout-minutes: 90
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Fetch latest upstream release
        id: upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          latest_tag=$(gh api repos/chen08209/FlClash/releases/latest --jq '.tag_name')
          latest_sha=$(gh api repos/chen08209/FlClash/git/ref/tags/$latest_tag --jq '.object.sha')
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "latest_sha=$latest_sha" >> "$GITHUB_OUTPUT"
          echo "Latest upstream tag: $latest_tag"
          echo "Latest upstream sha: $latest_sha"

      - name: Detect existing release
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.upstream.outputs.latest_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh api "repos/$REPO/releases/tags/$TAG" >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists: $TAG"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
            echo "Release does not exist yet: $TAG"
          fi

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/chen08209/FlClash.git || true
          git fetch upstream --tags --force

      - name: Checkout upstream tag
        env:
          TAG: ${{ steps.upstream.outputs.latest_tag }}
        run: |
          set -euo pipefail
          git checkout -B "build-$TAG" "tags/$TAG"
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"
          cache-dependency-path: |
            core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Get Flutter dependencies
        run: |
          flutter --version
          flutter pub get

      - name: Build Android debug package
        run: |
          dart setup.dart android

      - name: Prepare release assets
        env:
          TAG: ${{ steps.upstream.outputs.latest_tag }}
        run: |
          set -euo pipefail
          rm -rf release-assets
          mkdir -p release-assets
          find dist -type f \( -name '*.apk' \) -exec cp -L {} release-assets/ \;
          echo "Prepared local assets:"
          find release-assets -maxdepth 1 -type f \( -name '*.apk' \) -printf '%f\n'
          ls -lah release-assets
          test -n "$(find release-assets -maxdepth 1 -type f \( -name '*.apk' \))"
          cat > release-notes.md <<EOF
          Sync upstream release $TAG and build Android debug package.

          - Source: chen08209/FlClash@$TAG
          - Target: Android debug package only
          - Signing: debug/self-use only
          EOF

      - name: Create GitHub release via API
        if: steps.detect.outputs.release_exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.upstream.outputs.latest_tag }}
          TARGET_SHA: ${{ steps.upstream.outputs.latest_sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/$REPO/releases" \
            -f tag_name="$TAG" \
            -f target_commitish="$TARGET_SHA" \
            -f name="$TAG debug" \
            -f body="$(cat release-notes.md)"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.upstream.outputs.latest_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find release-assets -maxdepth 1 -type f \( -name '*.apk' \))
          printf 'Uploading files:\n%s\n' "${files[@]}"
          test "${#files[@]}" -gt 0
          gh release upload "$TAG" "${files[@]}" --clobber -R "$REPO"
