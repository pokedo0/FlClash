name: sync upstream android release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-build-release:
    runs-on: ubuntu-latest
    concurrency:
      group: sync-upstream-android-release
      cancel-in-progress: true
    timeout-minutes: 90
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Fetch latest upstream release
        id: upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          latest_tag=$(gh api repos/chen08209/FlClash/releases/latest --jq '.tag_name')
          latest_sha=$(gh api repos/chen08209/FlClash/git/ref/tags/$latest_tag --jq '.object.sha')
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "latest_sha=$latest_sha" >> "$GITHUB_OUTPUT"
          echo "Latest upstream tag: $latest_tag"
          echo "Latest upstream sha: $latest_sha"

      - name: Read synced upstream tag
        id: local_sync
        run: |
          set -euo pipefail
          synced_tag=""
          if [ -f .upstream-version ]; then
            synced_tag=$(tr -d '\r\n' < .upstream-version)
          fi
          echo "synced_tag=$synced_tag" >> "$GITHUB_OUTPUT"
          echo "Current synced tag: ${synced_tag:-<none>}"

      - name: Check whether sync is needed
        id: sync_check
        env:
          LATEST_TAG: ${{ steps.upstream.outputs.latest_tag }}
          SYNCED_TAG: ${{ steps.local_sync.outputs.synced_tag }}
        run: |
          set -euo pipefail
          if [ "$LATEST_TAG" = "$SYNCED_TAG" ]; then
            echo "sync_needed=false" >> "$GITHUB_OUTPUT"
            echo "Upstream tag unchanged; skip sync commit and continue packaging."
          else
            echo "sync_needed=true" >> "$GITHUB_OUTPUT"
            echo "Upstream tag changed from ${SYNCED_TAG:-<none>} to $LATEST_TAG"
          fi

      - name: Add upstream remote
        if: steps.sync_check.outputs.sync_needed == 'true'
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/chen08209/FlClash.git || true
          git fetch upstream --tags --force

      - name: Create local override patch
        if: steps.sync_check.outputs.sync_needed == 'true'
        run: |
          set -euo pipefail
          git diff --binary HEAD -- android/app/build.gradle.kts .github/workflows/sync-upstream-android-debug.yml > local-overrides.patch || true
          ls -lah local-overrides.patch

      - name: Sync upstream tag into current branch
        if: steps.sync_check.outputs.sync_needed == 'true'
        env:
          TAG: ${{ steps.upstream.outputs.latest_tag }}
        run: |
          set -euo pipefail
          git checkout ${GITHUB_REF_NAME}
          git merge --no-ff --no-commit "tags/$TAG"

      - name: Reapply local overrides
        if: steps.sync_check.outputs.sync_needed == 'true'
        run: |
          set -euo pipefail
          if [ -s local-overrides.patch ]; then
            git apply --3way --index local-overrides.patch
          fi

      - name: Update synced upstream tag file
        if: steps.sync_check.outputs.sync_needed == 'true'
        env:
          TAG: ${{ steps.upstream.outputs.latest_tag }}
        run: |
          set -euo pipefail
          printf '%s\n' "$TAG" > .upstream-version
          git add .upstream-version android/app/build.gradle.kts .github/workflows/sync-upstream-android-debug.yml

      - name: Commit synced upstream changes
        if: steps.sync_check.outputs.sync_needed == 'true'
        env:
          TAG: ${{ steps.upstream.outputs.latest_tag }}
        run: |
          set -euo pipefail
          if git diff --cached --quiet; then
            echo "No staged changes after sync; nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "sync: upstream $TAG"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Capture release target commit
        id: release_target
        run: |
          set -euo pipefail
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Resolve release name
        id: release_meta
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_TAG: ${{ steps.upstream.outputs.latest_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh api "repos/$REPO/releases/tags/$BASE_TAG" >/dev/null 2>&1; then
            suffix=$(date -u +'%Y%m%d-%H%M%S')
            release_tag="${BASE_TAG}-${suffix}"
            release_title="${BASE_TAG} release ${suffix}"
            echo "Existing release found for $BASE_TAG, using $release_tag"
          else
            release_tag="$BASE_TAG"
            release_title="$BASE_TAG release"
            echo "No existing release found for $BASE_TAG, using original tag"
          fi
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_title=$release_title" >> "$GITHUB_OUTPUT"

      - name: Restore fixed Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_STORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
          cat > android/local.properties <<EOF
          storePassword=$ANDROID_STORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"
          cache-dependency-path: |
            core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Get Flutter dependencies
        run: |
          flutter --version
          flutter pub get

      - name: Build Android release package
        run: |
          dart setup.dart android

      - name: Prepare release assets
        env:
          TAG: ${{ steps.upstream.outputs.latest_tag }}
        run: |
          set -euo pipefail
          rm -rf release-assets
          mkdir -p release-assets
          find dist -type f \( -name '*.apk' \) -exec cp -L {} release-assets/ \;
          echo "Prepared local assets:"
          find release-assets -maxdepth 1 -type f \( -name '*.apk' \) -printf '%f\n'
          ls -lah release-assets
          test -n "$(find release-assets -maxdepth 1 -type f \( -name '*.apk' \))"
          cat > release-notes.md <<EOF
          Sync upstream release $TAG, commit synced changes to this repository, and build Android release package.

          - Source: chen08209/FlClash@$TAG
          - Target: Android release APK only
          - Signing: debug keystore fallback for self-use upgrade installs
          EOF

      - name: Print APK package names
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y aapt
          mapfile -t files < <(find release-assets -maxdepth 1 -type f \( -name '*.apk' \))
          test "${#files[@]}" -gt 0
          for file in "${files[@]}"; do
            echo "Inspecting $(basename \"$file\")"
            aapt dump badging "$file" | sed -n "s/^package: name='\([^']*\)'.*/package=\1/p"
          done

      - name: Create GitHub release via API
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.release_meta.outputs.release_title }}
          TARGET_SHA: ${{ steps.release_target.outputs.commit_sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/$REPO/releases" \
            -f tag_name="$RELEASE_TAG" \
            -f target_commitish="$TARGET_SHA" \
            -f name="$RELEASE_TITLE" \
            -f body="$(cat release-notes.md)"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find release-assets -maxdepth 1 -type f \( -name '*.apk' \))
          printf 'Uploading files:\n%s\n' "${files[@]}"
          test "${#files[@]}" -gt 0
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber -R "$REPO"
